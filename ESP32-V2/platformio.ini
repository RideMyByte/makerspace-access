; PlatformIO project configuration for makerspace access NFC terminal V2.
; Board: Waveshare ESP32-C6 1.47inch LCD with PN532 and WS2812B status LED.
; ESP32-C6 uses RISC-V, requires platform >= 6.9.0 with arduino framework v3.x.

[platformio]
default_envs = esp32-c6

[env:esp32-c6]
platform = espressif32@^6.10.0
board = esp32-c6-devkitm-1
framework = arduino
board_build.mcu = esp32c6
board_build.variant = esp32c6
board_build.f_cpu = 160000000L
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.flash_frequency = 80MHz
board_upload.maximum_size = 4194304
board_upload.maximum_ram_size = 327680
upload_protocol = esptool
monitor_speed = 115200

build_flags =
  -std=gnu++17
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; TFT_eSPI configuration for Waveshare 1.47" ST7789V (172x320) via hardware SPI
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=172
  -DTFT_HEIGHT=320
  -DTFT_MOSI=4
  -DTFT_SCLK=7
  -DTFT_CS=6
  -DTFT_DC=5
  -DTFT_RST=3
  -DTFT_BL=2
  -DSPI_FREQUENCY=40000000
  -DTFT_RGB_ORDER=TFT_RGB
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  https://github.com/adafruit/Adafruit-PN532.git
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.7.0
