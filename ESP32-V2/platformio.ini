; PlatformIO project configuration for makerspace access NFC terminal V2.
; Board: Waveshare ESP32-C6 1.47inch LCD with PN532 and WS2812B status LED.
; Uses official arduino-esp32 v3.x from GitHub for ESP32-C6 Arduino support.

[platformio]
default_envs = esp32-c6

[env:esp32-c6]
platform = espressif32@^6.13.0
board = waveshare_esp32c6_147
board_dir = ./boards
framework = arduino
board_build.core = esp32
board_build.variant = esp32c6
monitor_speed = 115200

build_flags =
  -std=gnu++17
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; TFT_eSPI configuration for Waveshare 1.47" ST7789V (172x320) via hardware SPI
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=172
  -DTFT_HEIGHT=320
  -DTFT_MOSI=4
  -DTFT_SCLK=7
  -DTFT_CS=6
  -DTFT_DC=5
  -DTFT_RST=3
  -DTFT_BL=2
  -DSPI_FREQUENCY=40000000
  -DTFT_RGB_ORDER=TFT_RGB
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  https://github.com/adafruit/Adafruit-PN532.git
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.7.0

; Use the latest arduino-esp32 from GitHub (v3.x with ESP32-C6 support)
; Pin toolchain to the locally installed version
platform_packages =
  framework-arduinoespressif32@https://github.com/espressif/arduino-esp32.git
  toolchain-riscv32-esp@14.2.0+20251107
