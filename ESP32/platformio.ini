; PlatformIO project configuration for the makerspace access NFC terminal.
; Target board: ESP32-WROOM-32 (DevKit) with RFID-RC522 and WS2812B status LED.

[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
  -std=gnu++17

lib_deps =
  MFRC522
  bblanchon/ArduinoJson@^7.1.0
  fastled/FastLED@^3.7.0
