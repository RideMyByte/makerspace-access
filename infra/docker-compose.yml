# Docker Compose infrastructure for the makerspace access system.
# Start with: docker compose --env-file .env up -d postgres nginx

services:
  # PostgreSQL stores the core business data for users, permissions, devices, and access events.
  postgres:
    build:
      context: ./postgres
    image: ${POSTGRES_IMAGE:-makerspace-access-postgres:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-makerspace-access}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI backend skeleton. It is disabled by default via the "api" profile.
  # Start it when needed with: docker compose --profile api up -d --build
  api:
    build:
      context: ../api
    image: ${API_IMAGE:-makerspace-access-api:dev}
    container_name: ${COMPOSE_PROJECT_NAME:-makerspace-access}_api
    restart: unless-stopped
    profiles:
      - api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      API_PORT: ${API_PORT:-8000}
      API_KEY: ${API_KEY}
      REGISTRATION_API_KEY: ${REGISTRATION_API_KEY}
      CREATE_TABLES_ON_STARTUP: ${CREATE_TABLES_ON_STARTUP:-true}
    expose:
      - "${API_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:${API_PORT:-8000}/health'', timeout=3)"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # nginx is the public entry point. It serves HTTP on port 80 and proxies /api/ to the API service.
  nginx:
    image: nginx:1.27.1-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-makerspace-access}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../web/index.html:/usr/share/nginx/html/index.html:ro
      - ../web/register.html:/usr/share/nginx/html/register.html:ro
      - ../web/static/app.js:/usr/share/nginx/html/static/app.js:ro
      - ../web/static/register.js:/usr/share/nginx/html/static/register.js:ro
      - ../web/styles.css:/usr/share/nginx/html/static/styles.css:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  nginx_cache:
  nginx_logs:

networks:
  # Public-facing network for services that need host/client access through published ports.
  frontend:
    driver: bridge

  # Internal-only network for database and backend traffic. PostgreSQL is not exposed to the host.
  backend:
    driver: bridge
    internal: true
